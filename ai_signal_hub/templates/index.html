<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>AI Signal Top 15</title>
  <style>
    body { font-family: sans-serif; margin: 1rem; background: #111; color: #eee; }
    a { color: #8ecbff; }
    .card { border: 1px solid #333; border-radius: 10px; padding: .8rem; margin: .6rem 0; background:#1a1a1a; }
    .meta { font-size: .85rem; color: #aaa; }
    .tag { display: inline-block; border:1px solid #444; padding:2px 6px; border-radius:999px; margin-right:4px; font-size:.75rem; }
  </style>
</head>
<body>
<h2>Top 15 AI Signals — {{day}}</h2>
{% for d,p,e in rows %}
<div class="card">
  <div><strong>#{{d.rank}} {{p.title}}</strong></div>
  <div class="meta">score={{"%.2f"|format(d.score)}} reason={{d.reason}}</div>
  <div>
    {% if e and e.tags %}
      {% for t in e.tags.split(',') %}<span class="tag">{{t}}</span>{% endfor %}
    {% endif %}
  </div>
  <p>{{e.summary_long if e else p.text_content}}</p>
  <a href="{{p.link}}" target="_blank">Open source post/link</a>
</div>
{% endfor %}
</body>
</html>
