name: Pebble Package & Release

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:
  release:
    types: [published]

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build import ZIP
        run: |
          python scripts/package_pebble.py

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: pebble-import-zip
          path: dist/pebble-ai-digest-project.zip

  release-assets:
    if: github.event_name == 'release'
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build import ZIP
        run: |
          python scripts/package_pebble.py

      - name: Upload ZIP to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/pebble-ai-digest-project.zip
